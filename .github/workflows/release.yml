name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Build Windows Release
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File scripts\build-windows.ps1

      - name: Prepare Windows Asset
        shell: pwsh
        run: |
          $version = if ("${env:GITHUB_REF_TYPE}" -eq "tag") { "${env:GITHUB_REF_NAME}".TrimStart("v") } else { ("dev-$env:GITHUB_SHA").Substring(0, 11) }
          New-Item -ItemType Directory -Force release-assets | Out-Null
          Copy-Item dist\windows\CopySave.exe "release-assets\CopySave-$version-windows-x64.exe"

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: release-assets/CopySave-*-windows-x64.exe

  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build macOS Release
        run: |
          set -o pipefail
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            export PRODUCT_VERSION="${GITHUB_REF_NAME#v}"
          else
            export PRODUCT_VERSION="dev-${GITHUB_SHA::7}"
          fi
          bash scripts/build-macos.sh 2>&1 | tee build-macos.log

      - name: Upload macOS Build Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: macos-build-log
          path: build-macos.log

      - name: Prepare macOS Assets
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="dev-${GITHUB_SHA::7}"
          fi
          mkdir -p release-assets
          cp "dist/macos/CopySave-$VERSION.dmg" "release-assets/CopySave-$VERSION-macos.dmg"
          ditto -c -k --sequesterRsrc --keepParent "dist/macos/CopySave.app" "release-assets/CopySave-$VERSION-macos-app.zip"

      - name: Upload macOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-release
          path: release-assets/*

  publish-release:
    runs-on: ubuntu-latest
    needs:
      - build-windows
      - build-macos
    if: github.ref_type == 'tag'

    steps:
      - name: Download Windows Artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-release
          path: release-assets

      - name: Download macOS Artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-release
          path: release-assets

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
